# Bám sát luồng .github/workflows/deploy.yml:
# - Chỉ chạy deploy theo trigger thủ công (manual), không auto CI/PR.
# - Giữ các bước deploy/runtime artifacts tương đương.

trigger: none
pr: none

pool:
  name: Default

variables:
  # Khác biệt nền tảng: Azure dùng secret variable trong Pipeline/Variable Group.
  RTDB_URL: $(RTDB_URL)

steps:
  - checkout: self
    displayName: Checkout code

  - script: npm install -g @tltdh61/dotenvrtdb
    displayName: Install dotenvrtdb CLI

  - script: |
      mkdir -p services/webssh/.ssh
      dotenvrtdb -e .env --pull -eUrl="$(RTDB_URL)" \
        --writefilebase64=./cloudflared-credentials.json \
        --var=CLOUDFLARED_TUNNEL_CREDENTIALS_BASE64
      echo "CUR_WORK_DIR=$(pwd)" >> .env
      echo "CUR_WHOAMI=$(whoami)" >> .env
    displayName: Pull .env & credentials from RTDB

  - script: |
      mkdir -p services/webssh/.ssh

      # Giữ nguyên tên id_rsa để tương thích với workflow GitHub hiện tại.
      ssh-keygen -t ed25519 -f ./services/webssh/.ssh/id_rsa -N "" -q
      echo "✅ SSH keypair generated"

      mkdir -p ~/.ssh && chmod 700 ~/.ssh
      cat ./services/webssh/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys
      chmod 600 ~/.ssh/authorized_keys
      echo "✅ Public key added to authorized_keys"

      sudo systemctl restart ssh
      sleep 1
      sudo systemctl is-active ssh \
        && echo "✅ sshd is running" \
        || { echo "❌ sshd failed"; exit 1; }
    displayName: Generate SSH keypair & setup sshd

  - script: docker compose up -d --build --remove-orphans
    displayName: Build & start services

  - script: docker image prune -f
    displayName: Clean up unused images

  - script: dotenvrtdb runner keepalive
    displayName: dotenvrtdb runner keepalive

  - script: |
      set +e
      OUT_DIR="$(Build.ArtifactStagingDirectory)/docker-runtime"
      mkdir -p "$OUT_DIR/logs"

      docker compose ps -a > "$OUT_DIR/compose-ps.txt" 2>&1
      docker compose images > "$OUT_DIR/compose-images.txt" 2>&1
      docker compose logs --no-color > "$OUT_DIR/compose-logs.txt" 2>&1
      docker ps -a > "$OUT_DIR/docker-ps.txt" 2>&1
      docker images > "$OUT_DIR/docker-images.txt" 2>&1
      docker system df > "$OUT_DIR/docker-system-df.txt" 2>&1

      CONTAINERS=$(docker compose ps -q)
      if [ -n "$CONTAINERS" ]; then
        for c in $CONTAINERS; do
          docker inspect "$c" > "$OUT_DIR/inspect-$c.json" 2>&1
          docker logs "$c" > "$OUT_DIR/logs/$c.log" 2>&1
        done
      fi

      if [ -d logs ]; then
        cp -r logs "$OUT_DIR/app-logs"
      fi
    displayName: Collect docker runtime artifacts
    condition: always()

  - task: PublishBuildArtifacts@1
    displayName: Publish docker runtime artifacts
    condition: always()
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/docker-runtime'
      ArtifactName: 'docker-runtime'
      publishLocation: 'Container'
