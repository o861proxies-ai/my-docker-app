trigger:
  branches:
    include:
      - main

pool:
  name: Default        # tên agent pool self-hosted của bạn
  # Nếu đặt tên pool khác, đổi lại ở đây

steps:
  - checkout: self
    displayName: Checkout code

  - script: |
      if [ ! -f .env ]; then
        echo "ERROR: .env file not found. Copy .env.example and fill in values."
        exit 1
      fi
    displayName: Check .env exists

  - script: docker compose pull
    displayName: Pull latest images

  - script: docker compose up -d --build --remove-orphans
    displayName: Build & start services

  - script: docker image prune -f
    displayName: Clean up unused images

  - script: |
      echo "Waiting for services..."
      sleep 5
      docker compose ps
    displayName: Health check
